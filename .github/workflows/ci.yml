name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install .[dev]
      - name: Lint
        run: ruff check .
      - name: Unit tests (fast)
        run: pytest -m "not heavy" -q

  smoke-train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install .[dev]
      - name: End-to-end smoke (train -> register -> promote)
        run: pytest tests/test_smoke_train.py -q

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-test]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t pcb-defect-detector:ci .

  deploy-space:
    runs-on: ubuntu-latest
    needs: [lint-test, smoke-train, docker-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}   # e.g. username/pcb-defect-detector
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE" ]; then
            echo "HF_TOKEN/HF_SPACE not set — skipping deploy (configure repo secrets to enable)."
            exit 0
          fi
          git push --force "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}.git" HEAD:main
