# Single source of truth for the pipeline. DVC stages and training read this.
dataset:
  name: pcb-defects
  # 6 PCB defect classes (DeepPCB / PKU-Market-PCB convention).
  classes: [missing_hole, mouse_bite, open_circuit, short, spur, spurious_copper]
  root: data/pcb          # YOLO-format dataset root (images/ + labels/ + splits)
  val_fraction: 0.2
  seed: 42

train:
  # With tiling on (below), defects stay full-size inside 640px tiles, so we train
  # at 640 — fast and the real fix for tiny-defect detection. Without tiling, raise
  # imgsz toward 1280+ instead.
  model: yolov8s.pt
  imgsz: 640
  epochs: 100
  batch: 16               # 640px tiles fit comfortably on an 8GB GPU
  patience: 25            # early stopping on val mAP plateau
  device: ""              # "" = auto (cpu if no gpu)

tiling:
  # Slice ~3000px boards into 640px tiles so ~70px defects stay ~70px (not ~30px).
  # The single biggest lever on mAP for this dataset. Serving re-slices to match.
  enabled: true
  root: data/pcb_tiled
  tile_size: 640
  overlap: 0.2            # 20% tile overlap so edge-straddling defects survive
  keep_background: 0.15   # keep 15% of defect-free tiles as negatives (precision)

registry:
  model_name: pcb-defect-detector
  alias: production        # MLflow registry alias the serving layer loads
  # New model must beat current production on this metric by this margin to promote.
  promotion_metric: "mAP50-95"
  promotion_margin: 0.0

monitor:
  drift_threshold: 0.5    # share of drifted feature columns that trips a retrain
  reference_sample: 200   # images sampled from train set as the drift reference
  current_window: 200     # most-recent predictions compared against the reference
